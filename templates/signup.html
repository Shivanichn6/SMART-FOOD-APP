<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Signup</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">

</head>
<script src="{{ url_for('static', filename='js/script.js') }}"></script>
<body>

    <!-- NAVBAR -->

    <div class="navbar">

        <h1>🍴 Smart Food</h1>

        <div class="nav-links">

            <a href="/">Home</a>

            <a href="/menu">Menu</a>

            <a href="/about">About</a>

            <a href="/signup">Signup</a>

        </div>

    </div>

    <!-- SIGNUP FORM -->

    <div class="form-container">

        <h2>Create Account</h2>

        <form method="POST">

            <input type="text"
            name="name"
            placeholder="Enter Name"
            required>

            <input type="email"
            name="email"
            placeholder="Enter Email"
            required>

            <input type="password"
            name="password"
            placeholder="Create Password"
            required>

            <button type="submit">
                Create Account
            </button>

        </form>

    </div>

</body>

</html>
