<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
</head>
<body style="font-family: Arial; background:#f2f2f2;">

    <div style="width:300px; margin:100px auto; background:white; padding:20px; border-radius:10px;">
        
        <h2 style="text-align:center;">Admin Login</h2>

        <form>
            <input type="text" placeholder="Username" style="width:100%; padding:10px; margin-top:10px;">
            
            <input type="password" placeholder="Password" style="width:100%; padding:10px; margin-top:10px;">

            <button style="width:100%; padding:10px; margin-top:15px; background:orange; border:none;">
                Login
            </button>
        </form>

    </div>

</body>
</html>
